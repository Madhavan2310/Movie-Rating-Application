# ===================== SERVER =====================
server.port=8080

# ===================== DATABASE =====================
# Update username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/movie_recommendation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== TMDB API =====================
# Paste your TMDB API key here once you get it from https://www.themoviedb.org/settings/api
tmdb.api.key=YOUR_TMDB_API_KEY_HERE
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.image.base-url=https://image.tmdb.org/t/p/w500

# ===================== CORS =====================
# React dev server origin
app.cors.allowed-origin=http://localhost:3000
